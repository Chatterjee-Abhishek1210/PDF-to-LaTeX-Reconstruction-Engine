    }

    // Auto save session logic
    function initAutoSave() {
      const saved = localStorage.getItem('latex-editor-source');
      // If we have auto save, load it
      if (saved && editor) {
        editor.dispatch({
          changes: { from: 0, to: editor.state.doc.length, insert: saved }
        });
      }

      setInterval(() => {
        if (docDirty) {
          localStorage.setItem('latex-editor-source', editor.state.doc.toString());
          docDirty = false;
          showSavedIndicator();
        }
      }, 2000);
    }

    function showSavedIndicator() {
      const el = document.getElementById('saved-indicator');
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 1000);
    }

    // Proximity Scroll Preservation Helpers
    function getTopmostVisibleSourceLine() {
      const pane = document.getElementById('pdf-viewer-pane');
      const paneRect = pane.getBoundingClientRect();
      const elements = pane.querySelectorAll('[data-source-line]');
      for (let el of elements) {
        const rect = el.getBoundingClientRect();
        if (rect.top >= paneRect.top && rect.top <= paneRect.bottom) {
          return {
            line: parseInt(el.getAttribute('data-source-line')),
            offset: rect.top - paneRect.top
          };
        }
      }
      return null;
    }

    function restoreReadingPosition(savedPos) {
      if (!savedPos) return;
      const pane = document.getElementById('pdf-viewer-pane');
      const el = pane.querySelector(`[data-source-line="${savedPos.line}"]`);
      if (el) {
        const paneRect = pane.getBoundingClientRect();
        pane.scrollTop = pane.scrollTop + (el.getBoundingClientRect().top - paneRect.top) - savedPos.offset;
      }
    }

    // Compile LaTeX driver
    function compileLatex() {
      const btn = document.getElementById('compile-btn');
      const spin = document.getElementById('compile-spin');
      const btnTxt = document.getElementById('compile-btn-text');
      
      // Spinner state updates
      btnTxt.innerText = "Compiling...";
      spin.style.display = "inline-block";
      
      const text = editor.state.doc.toString();
      
      // Save topmost scroll position to prevent jumps
      const savedPos = getTopmostVisibleSourceLine();
      
      const compiler = new LaTeXCompiler(text);
      const res = compiler.compile();
      
      compiledBlocks = compiler.parseBlocks();
      compiledOutline = res.outline;
      
      // Update outline structure tree
      updateOutlinePanel(res.outline);
      
      // Paginate simulate preview pages
      paginateDocument(res.elements, res.footnotes);
      
      // Restore scroll alignment reading location
      restoreReadingPosition(savedPos);
      
      // Update page minimaps thumb
      updateMinimap();
      
      // Update error console diagnostics log list
      updateErrorDiagnostics(res.errors);
      
      // Update status statistics word count
      updateStatistics(text, compiler);
      
      // Re-initialize hover sync trigger attachments
      initPdfHoverEvents();
      
      // Spin finish highlights
      setTimeout(() => {
        spin.style.display = "none";
        btnTxt.innerText = "✓ Compiled";
        setTimeout(() => {
          btnTxt.innerText = "Compile";
        }, 1000);
      }, 300);
      
      // Bind inline cite/ref links clicks navigation
      attachPdfLinkEvents();
    }

    function attachPdfLinkEvents() {
      document.querySelectorAll('.pdf-ref').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const key = link.dataset.ref;
          const text = editor.state.doc.toString();
          const target = `\\label{${key}}`;
          const idx = text.indexOf(target);
          if (idx !== -1) {
            highlightLine(editor.state.doc.lineAt(idx).number);
          }
        });
      });
      
      document.querySelectorAll('.pdf-cite').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const key = link.dataset.cite;
          const text = editor.state.doc.toString();
          const target = `\\bibitem{${key}}`;
          const idx = text.indexOf(target);
          if (idx !== -1) {
            highlightLine(editor.state.doc.lineAt(idx).number);
          }
        });
      });
    }

    // Document Statistics Panel & word count
    function updateStatistics(text, compiler) {
      const words = text.replace(/\\.*/g, '').replace(/[^a-zA-Z\s]/g, '').trim().split(/\s+/).filter(w => w.length > 0).length;
      const chars = text.length;
      const lines = text.split('\n').length;
      
      document.getElementById('stat-words').innerText = words;
      document.getElementById('stat-chars').innerText = chars;
      document.getElementById('stat-lines').innerText = lines;
      document.getElementById('stat-sections').innerText = compiler.outline.length;
      document.getElementById('stat-equations').innerText = compiler.equationCount;
      document.getElementById('stat-tables').innerText = compiler.tableCount;
      document.getElementById('stat-figures').innerText = compiler.figureCount;
      
      document.getElementById('word-count-txt').innerText = `${words} words`;
    }

    function initStatsModal() {
      const modal = document.getElementById('stats-overlay');
      document.getElementById('stats-trigger').addEventListener('click', () => {
        modal.classList.add('active');
      });
      document.getElementById('close-stats-btn').addEventListener('click', () => {
        modal.classList.remove('active');
      });
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('active');
      });
    }

    // Document outline tree builder
    function updateOutlinePanel(outline) {
      const container = document.getElementById('outline-content');
      container.innerHTML = '';
      
      if (outline.length === 0) {
        container.innerHTML = '<div class="outline-item" style="color:var(--text-muted);cursor:default;">No sections defined</div>';
        return;
      }
      
      outline.forEach(item => {
        const el = document.createElement('div');
        const depth = item.type === 'section' ? 1 : item.type === 'subsection' ? 2 : 3;
        el.className = `outline-item sec-${depth}`;
        el.dataset.line = item.line;
        el.innerText = `${item.number} ${item.title}`;
        
        el.addEventListener('click', () => {
          highlightLine(item.line);
        });
        container.appendChild(el);
      });
    }

    function highlightActiveOutlineSection(lineNum) {
      let activeItem = null;
      for (let item of compiledOutline) {
        if (item.line <= lineNum) {
          if (!activeItem || item.line > activeItem.line) {
            activeItem = item;
          }
        }
      }
      
      document.querySelectorAll('.outline-item').forEach(el => {
        el.classList.remove('active');
      });
      
      if (activeItem) {
        const el = document.querySelector(`.outline-item[data-line="${activeItem.line}"]`);
        if (el) {
          el.classList.add('active');
        }
      }
    }

    // Compiler errors logger console panel
    function updateErrorDiagnostics(errors) {
      const consolePanel = document.getElementById('error-console');
      const list = document.getElementById('error-console-list');
      const badge = document.getElementById('error-count-badge');
      const badgeTxt = document.getElementById('error-count-txt');
      
      list.innerHTML = '';
      
      const errorCount = errors.filter(e => e.severity === 'error').length;
      if (errors.length > 0) {
        badge.style.display = 'inline-block';
        badgeTxt.innerText = `✖ ${errors.length} Diagnostics (${errorCount} Errors)`;
        
        errors.forEach(err => {
          const item = document.createElement('div');
          item.className = `error-item severity-${err.severity}`;
          item.innerHTML = `
            <span class="error-line-badge">Line ${err.line}</span>
            <span class="error-msg-txt">${err.message}</span>
          `;
          
          item.addEventListener('click', () => {
            highlightLine(err.line);
          });
          list.appendChild(item);
        });
      } else {
        badge.style.display = 'none';
        consolePanel.classList.add('collapsed');
      }
      
      // Dispatch CodeMirror diagnostics linter warnings
      const diagnostics = errors.map(err => ({
        from: err.from,
        to: err.to,
        severity: err.severity,
        message: err.message
      }));
      editor.dispatch(setDiagnostics(editor.state, diagnostics));
    }

    function setDiagnostics(state, diagnostics) {
      return {
        effects: StateEffect.define().of(diagnostics)
      };
    }

    function highlightLine(lineNum) {
      if (lineNum < 1 || lineNum > editor.state.doc.lines) return;
      const line = editor.state.doc.line(lineNum);
      editor.dispatch({
        selection: { anchor: line.from, head: line.from },
        scrollIntoView: true,
        effects: [highlightLineEffect.of(lineNum)]
      });
      
      editor.focus();
      
      if (window.highlightTimeout) clearTimeout(window.highlightTimeout);
      window.highlightTimeout = setTimeout(() => {
        editor.dispatch({
          effects: [clearHighlightEffect.of()]
        });
      }, 1500);
    }

    // status bar toast feedback
    function showStatusToast(msg) {
      const badge = document.getElementById('compile-status-badge');
      const prev = badge.innerText;
      badge.innerText = msg;
      setTimeout(() => { badge.innerText = prev; }, 1500);
    }

    // ─────────────────────────────────────────────────────────────────
    // PAGE MINIMAP SLIDE SYNC
    // ─────────────────────────────────────────────────────────────────
    function updateMinimap() {
      const minimap = document.getElementById('pdf-minimap');
      minimap.innerHTML = '';
      
      const pages = document.querySelectorAll('.pdf-page');
      pages.forEach((page, idx) => {
        const pageNum = idx + 1;
        const thumb = document.createElement('div');
        thumb.className = 'minimap-page';
        thumb.dataset.page = pageNum;
        thumb.innerHTML = `<span class="minimap-page-number">${pageNum}</span>`;
        
        thumb.addEventListener('click', () => {
          page.scrollIntoView({ behavior: 'smooth' });
        });
        minimap.appendChild(thumb);
      });
      syncMinimapHighlight();
    }

    function syncMinimapHighlight() {
      const pages = document.querySelectorAll('.pdf-page');
      const pane = document.getElementById('pdf-viewer-pane');
      if (pages.length === 0) return;
      
      let activeNum = 1;
      let minDiff = Infinity;
      const paneCenter = pane.getBoundingClientRect().top + pane.clientHeight / 2;
      
      pages.forEach(page => {
        const rect = page.getBoundingClientRect();
        const pageCenter = rect.top + rect.height / 2;
        const diff = Math.abs(pageCenter - paneCenter);
        if (diff < minDiff) {
          minDiff = diff;
          activeNum = parseInt(page.dataset.page);
        }
      });
      
      document.querySelectorAll('.minimap-page').forEach(thumb => {
        if (parseInt(thumb.dataset.page) === activeNum) {
          thumb.classList.add('active');
        } else {
          thumb.classList.remove('active');
        }
      });
    }

    // ─────────────────────────────────────────────────────────────────
    // FORWARD SYNC: CODE EDITOR → PDF SCROLL
    // ─────────────────────────────────────────────────────────────────
    function syncCodeToPdf(lineNum) {
      let bestBlock = null;
      for (let block of compiledBlocks) {
        if (block.line <= lineNum) {
          if (!bestBlock || block.line > bestBlock.line) {
            bestBlock = block;
          }
        }
      }
      
      if (bestBlock && bestBlock !== lastActiveBlock) {
        lastActiveBlock = bestBlock;
        const target = document.querySelector(`#pdf-pages-container [data-source-line="${bestBlock.line}"]`);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          target.classList.remove('pdf-highlight-flash');
          void target.offsetWidth; 
          target.classList.add('pdf-highlight-flash');
        }
      }
    }

    // ─────────────────────────────────────────────────────────────────
    // INVERSE SYNC: PDF VIEW → CODE EDITOR
    // ─────────────────────────────────────────────────────────────────
    function initPdfHoverEvents() {
      const tooltip = document.getElementById('pdf-hover-tooltip');
      const viewer = document.getElementById('pdf-viewer-pane');
      
      // Clear indicators when leaving the viewer pane
      viewer.addEventListener('mouseleave', () => {
        tooltip.style.display = 'none';
        editor.dispatch({ effects: [clearHoverLineEffect.of()] });
      });

      // Hover movement triggers
      document.querySelectorAll('[data-source-line]').forEach(el => {
        el.addEventListener('mousemove', (e) => {
          e.stopPropagation();
          const lineNum = parseInt(el.getAttribute('data-source-line'));
          
          // Tooltip position setup
          tooltip.innerText = `Line ${lineNum}`;
          tooltip.style.left = (e.clientX + 15) + 'px';
          tooltip.style.top = (e.clientY + 15) + 'px';
          tooltip.style.display = 'block';
          
          // Dispatch chevron indicator to CodeMirror
          editor.dispatch({ effects: [setHoverLineEffect.of(lineNum)] });
        });
        
        el.addEventListener('mouseleave', () => {
          tooltip.style.display = 'none';
          editor.dispatch({ effects: [clearHoverLineEffect.of()] });
        });
      });
    }

    function initPdfSyncEvents() {
      const viewer = document.getElementById('pdf-viewer-pane');
      
      // Single Click sync
      viewer.addEventListener('click', (e) => {
        const textSpan = e.target.closest('[data-source-line]');
        if (textSpan && !textSpan.isContentEditable) {
          const lineNum = parseInt(textSpan.getAttribute('data-source-line'));
          highlightLine(lineNum);
          
          // PDF Side Border Flash
          textSpan.classList.add('pdf-click-active');
          setTimeout(() => { textSpan.classList.remove('pdf-click-active'); }, 1500);
        }
      });
      
      // Double Click Edit
      viewer.addEventListener('dblclick', (e) => {
        const target = e.target.closest('[data-source-line]');
        if (!target) return;
        
        // Exclude math blocks, figures, and tables
        const isInsideMath = target.closest('.katex') || target.closest('.latex-equation-block');
        const isHeading = target.closest('h2') || target.closest('h3') || target.closest('h4');
        const isFloat = target.closest('.latex-table-container') || target.closest('.latex-figure');
        
        if (isInsideMath || isHeading || isFloat) return;
        
        e.preventDefault();
        
        const originalText = target.innerText;
        target.contentEditable = "true";
        target.focus();
        target.classList.add('inline-editing');
        
        let cancelled = false;

        const finishEdit = () => {
          target.contentEditable = "false";
          target.classList.remove('inline-editing');
          
          if (cancelled) {
            target.innerText = originalText;
            return;
          }

          const newText = target.innerText;
          if (originalText !== newText) {
            const lineNum = parseInt(target.getAttribute('data-source-line'));
            replaceTextInSource(originalText, newText, lineNum);
          }
        };
        
        target.addEventListener('blur', finishEdit, { once: true });
        
        target.addEventListener('keydown', (evt) => {
          if (evt.key === 'Enter') {
            evt.preventDefault();
            target.blur();
          }
          if (evt.key === 'Escape') {
            cancelled = true;
            evt.preventDefault();
            target.blur();
          }
        });
      });
    }

    function replaceTextInSource(oldText, newText, lineNum) {
      const doc = editor.state.doc;
      const numLines = doc.lines;
      const radius = 5;
      const start = Math.max(1, lineNum - radius);
      const end = Math.min(numLines, lineNum + radius);
      
      const cleanStr = (s) => s.replace(/\s+/g, ' ').trim();
      const cleanedOld = cleanStr(oldText);
      if (!cleanedOld) return;

      for (let offset = 0; offset <= radius; offset++) {
        const linesToCheck = [];
        if (lineNum - offset >= start) linesToCheck.push(lineNum - offset);
        if (offset > 0 && lineNum + offset <= end) linesToCheck.push(lineNum + offset);
        
        for (let l of linesToCheck) {
          const lineText = doc.line(l).text;
          
          // substring check
          let idx = lineText.indexOf(oldText);
          if (idx !== -1) {
            const startPos = doc.line(l).from + idx;
            editor.dispatch({
              changes: { from: startPos, to: startPos + oldText.length, insert: newText }
            });
            showSourceUpdatedFlash(l);
            compileLatex();
            return;
          }
          
          // fuzzy check
          const cleanedLine = cleanStr(lineText);
          if (cleanedLine.indexOf(cleanedOld) !== -1) {
            const words = oldText.split(/\s+/).filter(w => w.length > 0);
            if (words.length > 0) {
              let firstWordIdx = lineText.indexOf(words[0]);
              let lastWordIdx = lineText.lastIndexOf(words[words.length - 1]);
              if (firstWordIdx !== -1 && lastWordIdx !== -1 && lastWordIdx >= firstWordIdx) {
                const startPos = doc.line(l).from + firstWordIdx;
                const endPos = doc.line(l).from + lastWordIdx + words[words.length - 1].length;
                editor.dispatch({
                  changes: { from: startPos, to: endPos, insert: newText }
                });
                showSourceUpdatedFlash(l);
                compileLatex();
                return;
              }
            }
          }
        }
      }
      
      // Fallback global search
      const fullText = doc.toString();
      const idx = fullText.indexOf(oldText);
      if (idx !== -1) {
        editor.dispatch({
          changes: { from: idx, to: idx + oldText.length, insert: newText }
        });
        showSourceUpdatedFlash(doc.lineAt(idx).number);
        compileLatex();
      }
    }

    function showSourceUpdatedFlash(lineNum) {
      editor.dispatch({
        effects: [greenFlashEffect.of(lineNum)]
      });
      showStatusToast("Source updated");
      setTimeout(() => {
        editor.dispatch({
          effects: [clearGreenFlashEffect.of()]
        });
      }, 1500);
    }

    // ─────────────────────────────────────────────────────────────────
    // SNIPPETS PALETTE DIALOG OVERLAY (Ctrl+K)
    // ─────────────────────────────────────────────────────────────────
    function initCommandPalette() {
      const overlay = document.getElementById('palette-overlay');
      const search = document.getElementById('palette-search');
      const list = document.getElementById('palette-list');
      let activeIndex = 0;
      let filtered = [];

      window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key.toLowerCase() === 'k') {
          e.preventDefault();
          showPalette();
        }
        if (e.key === 'Escape' && overlay.classList.contains('active')) {
          hidePalette();
        }
      });

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) hidePalette();
      });

      search.addEventListener('input', () => {
        renderListItems(search.value);
      });

      search.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          activeIndex = (activeIndex + 1) % filtered.length;
          updateSelected();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          activeIndex = (activeIndex - 1 + filtered.length) % filtered.length;
          updateSelected();
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (filtered[activeIndex]) {
            insertSnippetText(filtered[activeIndex].code);
          }
        }
      });

      function showPalette() {
        overlay.classList.add('active');
        search.value = '';
        renderListItems('');
        search.focus();
      }

      // Hide Command Palette
      function hidePalette() {
        overlay.classList.remove('active');
        editor.focus();
      }

      function renderListItems(query) {
        list.innerHTML = '';
        filtered = SNIPPETS.filter(item => 
          item.name.toLowerCase().includes(query.toLowerCase()) || 
          item.desc.toLowerCase().includes(query.toLowerCase())
        );
        
        activeIndex = 0;
        
        filtered.forEach((item, idx) => {
          const el = document.createElement('div');
          el.className = `palette-item ${idx === 0 ? 'selected' : ''}`;
          el.dataset.idx = idx;
          el.innerHTML = `
            <div>
              <div style="font-weight:600;">${item.name}</div>
              <div style="font-size:0.75rem;opacity:0.8;">${item.desc}</div>
            </div>
            <div class="item-meta">${item.code.substring(0, 25)}${item.code.length > 25 ? '...' : ''}</div>
          `;
          
          el.addEventListener('click', () => {
            insertSnippetText(item.code);
          });
          list.appendChild(el);
        });
      }

      function updateSelected() {
        const items = list.querySelectorAll('.palette-item');
        items.forEach(el => el.classList.remove('selected'));
        const activeEl = list.querySelector(`[data-idx="${activeIndex}"]`);
        if (activeEl) {
          activeEl.classList.add('selected');
          activeEl.scrollIntoView({ block: 'nearest' });
        }
      }

      function insertSnippetText(code) {
        const sel = editor.state.selection.main;
        editor.dispatch({
          changes: { from: sel.from, to: sel.to, insert: code },
          selection: { anchor: sel.from + code.length }
        });
        hidePalette();
      }
    }

    // ─────────────────────────────────────────────────────────────────
    // SEARCH & REPLACE PANEL LOGIC (Ctrl+F / Ctrl+H)
    // ─────────────────────────────────────────────────────────────────
    function initSearchReplace() {
      const panel = document.getElementById('search-replace-panel');
      const searchInput = document.getElementById('search-input');
      const replaceInput = document.getElementById('replace-input');
      const btnCase = document.getElementById('search-case');
      const btnRegex = document.getElementById('search-regex');
      
      window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'f') {
          e.preventDefault();
          toggleSearchPanel(true);
        }
        if (e.ctrlKey && e.key === 'h') {
          e.preventDefault();
          toggleSearchPanel(true, true);
        }
      });

      document.getElementById('close-search-btn').addEventListener('click', () => {
        toggleSearchPanel(false);
      });

      searchInput.addEventListener('input', performSearch);
      btnCase.addEventListener('change', performSearch);
      btnRegex.addEventListener('change', performSearch);
      
      document.getElementById('search-next').addEventListener('click', () => {
        if (searchMatches.length > 0) {
          searchActiveIndex = (searchActiveIndex + 1) % searchMatches.length;
          scrollToActiveMatch();
          dispatchSearchHighlight();
        }
      });

      document.getElementById('search-prev').addEventListener('click', () => {
        if (searchMatches.length > 0) {
          searchActiveIndex = (searchActiveIndex - 1 + searchMatches.length) % searchMatches.length;
          scrollToActiveMatch();
          dispatchSearchHighlight();
        }
      });

      document.getElementById('replace-btn').addEventListener('click', replaceCurrent);
      document.getElementById('replace-all-btn').addEventListener('click', replaceAll);
    }

    function toggleSearchPanel(show, focusReplace = false) {
      const panel = document.getElementById('search-replace-panel');
      if (show) {
        panel.classList.remove('collapsed');
        if (focusReplace) {
          document.getElementById('replace-input').focus();
        } else {
          document.getElementById('search-input').focus();
        }
        performSearch();
      } else {
        panel.classList.add('collapsed');
        searchMatches = [];
        searchActiveIndex = -1;
        editor.dispatch({ effects: [searchEffect.of({ matches: [], activeIndex: -1 })] });
        editor.focus();
      }
    }

    function performSearch() {
      const query = document.getElementById('search-input').value;
      if (!query) {
        searchMatches = [];
        searchActiveIndex = -1;
        updateSearchUI();
        editor.dispatch({ effects: [searchEffect.of({ matches: [], activeIndex: -1 })] });
        return;
      }
      
      const caseSensitive = document.getElementById('search-case').checked;
      const isRegex = document.getElementById('search-regex').checked;
      const docText = editor.state.doc.toString();
      
      searchMatches = [];
      try {
        if (isRegex) {
          const flags = caseSensitive ? 'g' : 'gi';
          const regex = new RegExp(query, flags);
          let match;
          while ((match = regex.exec(docText)) !== null) {
            if (match[0].length === 0) break;
            searchMatches.push({ from: match.index, to: match.index + match[0].length });
          }
        } else {
          const searchStr = caseSensitive ? query : query.toLowerCase();
          const targetText = caseSensitive ? docText : docText.toLowerCase();
          let idx = targetText.indexOf(searchStr);
          while (idx !== -1) {
            searchMatches.push({ from: idx, to: idx + searchStr.length });
            idx = targetText.indexOf(searchStr, idx + searchStr.length);
          }
        }
      } catch (err) {}
      
      if (searchMatches.length > 0) {
        if (searchActiveIndex === -1 || searchActiveIndex >= searchMatches.length) {
          searchActiveIndex = 0;
        }
      } else {
        searchActiveIndex = -1;
      }
      
      updateSearchUI();
      dispatchSearchHighlight();
      scrollToActiveMatch();
    }

    function scrollToActiveMatch() {
      if (searchActiveIndex !== -1 && searchMatches[searchActiveIndex]) {
        const match = searchMatches[searchActiveIndex];
        editor.dispatch({
          selection: { anchor: match.from, head: match.to },
          scrollIntoView: true
        });
      }
    }

    function dispatchSearchHighlight() {
      editor.dispatch({
        effects: [searchEffect.of({ matches: searchMatches, activeIndex: searchActiveIndex })]
      });
    }

    function updateSearchUI() {
      const countSpan = document.getElementById('search-count');
      if (searchMatches.length > 0) {
        countSpan.innerText = `${searchActiveIndex + 1} of ${searchMatches.length}`;
      } else {
        countSpan.innerText = '0 of 0';
      }
    }

    function replaceCurrent() {
      if (searchActiveIndex !== -1 && searchMatches[searchActiveIndex]) {
        const match = searchMatches[searchActiveIndex];
        const replacement = document.getElementById('replace-input').value;
        editor.dispatch({
          changes: { from: match.from, to: match.to, insert: replacement }
        });
        performSearch();
      }
    }

    // Replace all matching terms in editor
    function replaceAll() {
      if (searchMatches.length === 0) return;
      const replacement = document.getElementById('replace-input').value;
      const changes = searchMatches.map(match => ({
        from: match.from,
        to: match.to,
        insert: replacement
      })).reverse();
      
      editor.dispatch({ changes });
      performSearch();
    }

    // ─────────────────────────────────────────────────────────────────
    // CODEMIRROR 6 ENGINE INITIALIZATION
    // ─────────────────────────────────────────────────────────────────
    function initCodeMirror() {
      const container = document.getElementById('editor-container');
      const latexLanguage = StreamLanguage.define(stex);
      
      const themeConfig = EditorView.theme({
        "&": { height: "100%" },
        ".cm-scroller": { overflow: "auto" }
      });
      
      const state = EditorState.create({
        doc: SAMPLE_DOCUMENT,
        extensions: [
          themeConfig,
          lineNumbers(),
          highlightActiveLine(),
          highlightActiveLineGutter(),
          bracketMatching(),
          foldGutter(),
          keymap.of([
            ...defaultKeymap,
            ...historyKeymap,
            ...foldKeymap
          ]),
          history(),
          latexLanguage,
          
          highlightField,
          greenFlashField,
          searchField,
          hoverLineField,
          hoverGutter,
          
          lintGutter(),
          
          // Selection updates trigger Forward Sync scrolling
          EditorView.updateListener.of((update) => {
            if (update.selectionSet) {
              const pos = update.state.selection.main.head;
              const line = update.state.doc.lineAt(pos);
              
              // Coordinates status update
              const col = pos - line.from + 1;
              document.getElementById('cursor-pos-txt').innerText = `Ln ${line.number}:Col ${col}`;
              
              // Highlight active section outline item
              highlightActiveOutlineSection(line.number);
              
              // Trigger forward scroll
              syncCodeToPdf(line.number);
            }
            
            // keystroke auto-compiles debouncer
            if (update.docChanged) {
              docDirty = true;
              const auto = document.getElementById('auto-compile-toggle').checked;
              if (auto) {
                if (compileTimeout) clearTimeout(compileTimeout);
                compileTimeout = setTimeout(compileLatex, 500);
              }
            }
          })
        ]
      });

      editor = new EditorView({
        state,
        parent: container
      });
    }

    // ─────────────────────────────────────────────────────────────────
    // MAIN APP INITIALIZATION
    // ─────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      initResizer();
      initOutlineToggle();
      initZoomControls();
      initThemeToggle();
      initFormatter();
      initExporter();
      initCommandPalette();
      initSearchReplace();
      initStatsModal();
      
      initCodeMirror();
      initAutoSave();
      
      // Initial Compilation
      compileLatex();
      
      // Attach click events
      initPdfSyncEvents();
      
      // Bind compile click
      document.getElementById('compile-btn').addEventListener('click', compileLatex);
      
      // Auto compile checkbox label state toggle
      const autoToggle = document.getElementById('auto-compile-toggle');
      const autoLabel = document.getElementById('auto-compile-label');
      autoToggle.addEventListener('change', () => {
        autoLabel.innerText = autoToggle.checked ? "Auto: ON" : "Auto: OFF";
      });

      // Bind global Ctrl+Enter to compile
      window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
          e.preventDefault();
          compileLatex();
        }
      });
      
      // Scroll listener to update minimap active page highlight
      document.getElementById('pdf-viewer-pane').addEventListener('scroll', syncMinimapHighlight);
      
      // Collapsible diagnostics panels triggers
      document.getElementById('error-count-badge').addEventListener('click', () => {
        document.getElementById('error-console').classList.toggle('collapsed');
      });
      document.getElementById('close-console-btn').addEventListener('click', () => {
        document.getElementById('error-console').classList.add('collapsed');
      });
    });
  </script>
</body>
</html>
